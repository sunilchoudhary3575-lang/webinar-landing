  <style>
    /* Additional custom styling for the thank-you page to make it extremely premium */
    .thankyou-page {
      min-height: calc(100vh - var(--header-height));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #f0f5fa 0%, #e2effa 100%);
      position: relative;
      overflow: hidden;
    }
    
    .thankyou-card {
      background: var(--bg-white);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-xl);
      padding: 50px 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      border: 1px solid var(--border-light);
      position: relative;
      z-index: 2;
    }

    .success-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background-color: rgba(16, 185, 129, 0.1);
      color: var(--emerald-600);
      border-radius: 50%;
      margin-bottom: 24px;
      animation: scaleIn 0.5s ease-out;
    }

    @keyframes scaleIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .thankyou-title {
      font-size: 2.2rem;
      margin-bottom: 12px;
      color: var(--text-dark);
    }

    .thankyou-subtitle {
      font-size: 1.1rem;
      color: var(--text-slate);
      margin-bottom: 32px;
    }

    .webinar-details-box {
      background-color: var(--bg-light);
      border-left: 4px solid var(--primary);
      border-radius: var(--border-radius-md);
      padding: 20px;
      margin-bottom: 32px;
      text-align: left;
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 1.05rem;
    }

    .detail-item:last-child {
      margin-bottom: 0;
    }

    .detail-icon {
      color: var(--primary);
      flex-shrink: 0;
    }

    .steps-container {
      margin-top: 32px;
      text-align: left;
      border-top: 1px solid var(--border-light);
      padding-top: 24px;
    }

    .steps-title {
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 16px;
      font-size: 1.1rem;
    }

    .step-list {
      list-style-type: none;
    }

    .step-item {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: flex-start;
    }

    .step-num {
      background-color: var(--primary);
      color: white;
      font-size: 0.85rem;
      font-weight: 700;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .step-text {
      color: var(--text-slate);
      font-size: 0.95rem;
    }

    .whatsapp-btn {
      width: 100%;
      padding: 16px 28px;
      font-size: 1.1rem;
      border-radius: var(--border-radius-md);
      margin-top: 10px;
      text-decoration: none;
      display: inline-flex;
      gap: 10px;
      box-shadow: 0 4px 14px rgba(5, 150, 105, 0.3);
    }
    
    .back-home {
      display: inline-block;
      margin-top: 24px;
      color: var(--primary);
      font-weight: 600;
      transition: color 0.2s;
    }
    
    .back-home:hover {
      color: var(--primary-hover);
      text-decoration: underline;
    }

    /* Abstract shapes background */
    .bg-shape-1 {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 40%;
      aspect-ratio: 1;
      background: radial-gradient(circle, rgba(4,107,210,0.08) 0%, rgba(255,255,255,0) 70%);
      z-index: 1;
      pointer-events: none;
    }

    .bg-shape-2 {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 45%;
      aspect-ratio: 1;
      background: radial-gradient(circle, rgba(16,185,129,0.06) 0%, rgba(255,255,255,0) 70%);
      z-index: 1;
      pointer-events: none;
    }
  </style>

    </div>
  </main>
